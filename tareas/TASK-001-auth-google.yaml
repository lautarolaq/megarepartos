notas: |
  El verificador de Google id_token se mockea en tests (no hacemos calls reales
  a Google en CI). En desarrollo local hay que crear un OAuth client en
  console.cloud.google.com y completar GOOGLE_OAUTH_CLIENT_ID / SECRET en `.env`.

  TASK-002 se entrega en el mismo PR porque el flow de OAuth necesita Empresa
  y Usuario para emitir el JWT (no hay forma natural de partirlo).
