id: TASK-001
nombre: "Autenticación con Google OAuth + JWT"
tipo: feature
sprint: 1
prioridad: alta

contexto: |
  Permitir que un usuario inicie sesión con su cuenta de Google y obtenga
  tokens JWT (access + refresh) para llamar a la API.

  Flujo Authorization Code (server-side):
    1. Frontend abre `/api/auth/google/url` y obtiene la URL de Google.
    2. Usuario autoriza en Google.
    3. Google redirige a `/api/auth/google/callback?code=...&state=...`.
    4. Backend intercambia code → id_token + access_token, verifica el id_token,
       extrae `sub`, `email`, `name`.
    5. Backend ejecuta `login_or_create_user` (TASK-002) para resolver Empresa+Usuario.
    6. Backend setea cookie `mr_refresh` (HTTP-only, SameSite=Lax) y redirige al
       frontend con el access_token en query string (efímero).
    7. Frontend lo guarda en memoria (Zustand) y lo pasa como `Authorization: Bearer`.

  Refresh: `POST /api/auth/refresh` lee cookie `mr_refresh` y devuelve un access
  nuevo. Logout: `POST /api/auth/logout` borra la cookie.

  Esta tarea cubre la infra de auth (JWT + verificación Google + dependencias
  FastAPI). El primer-login que crea Empresa+Usuario está en TASK-002 (en este
  mismo PR por acoplamiento real).

comportamiento:
  - "REQ-AUTH-001: GET /api/auth/google/url devuelve `{url}` con la URL de autorización de Google con state firmado."
  - "REQ-AUTH-002: GET /api/auth/google/callback con code válido y state firmado redirige al frontend con access_token en query string."
  - "REQ-AUTH-003: GET /api/auth/google/callback con state inválido devuelve 400 VALIDACION_INPUT."
  - "REQ-AUTH-004: POST /api/auth/refresh con cookie mr_refresh válida devuelve nuevo access_token."
  - "REQ-AUTH-005: POST /api/auth/refresh sin cookie devuelve 401 AUTH_REQUIRED."
  - "REQ-AUTH-006: POST /api/auth/refresh con cookie expirada devuelve 401 AUTH_INVALID."
  - "REQ-AUTH-007: POST /api/auth/logout con cookie limpia la cookie y devuelve 204."
  - "REQ-AUTH-008: GET /api/auth/me con Bearer access_token válido devuelve `{usuario, empresa}` del request."
  - "REQ-AUTH-009: GET /api/auth/me sin token devuelve 401 AUTH_REQUIRED."
  - "REQ-AUTH-010: GET /api/auth/me con token expirado devuelve 401 AUTH_INVALID."
  - "REQ-AUTH-011: Access tokens TTL = JWT_ACCESS_TTL_MIN minutos. Refresh tokens TTL = JWT_REFRESH_TTL_DAYS días."
  - "REQ-AUTH-012: El claim del JWT incluye `sub` (usuario_id), `empresa_id`, `rol`, `type` (access|refresh), `exp`, `iat`."

no_debe:
  - "Aceptar tokens firmados con un secret distinto al de Settings."
  - "Devolver detalles internos del error (stack trace, query, etc.) al cliente."
  - "Loguear el access_token o refresh_token completos."

