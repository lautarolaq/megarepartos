<!DOCTYPE html>
<html lang="es-AR">
  <head>
    <meta charset="utf-8" />
    <title>Megarepartos</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
        margin: 0;
        padding: 16px;
        width: 280px;
        color: #1e293b;
      }
      h1 {
        margin: 0 0 4px;
        font-size: 16px;
        font-weight: 600;
      }
      p {
        margin: 0 0 12px;
        font-size: 13px;
        color: #475569;
      }
      .row {
        display: flex;
        justify-content: space-between;
        font-size: 12px;
        color: #64748b;
        margin-top: 8px;
      }
      a {
        color: #0284c7;
        text-decoration: none;
      }
      a:hover {
        text-decoration: underline;
      }
      .badge {
        display: inline-block;
        background: #ecfdf5;
        color: #047857;
        padding: 2px 8px;
        border-radius: 999px;
        font-size: 11px;
        font-weight: 500;
      }
    </style>
  </head>
  <body>
    <h1>Megarepartos</h1>
    <p>
      Esta extensión te permite enviar links a tus clientes desde WhatsApp Web sin tocar
      "Enviar" 50 veces.
    </p>
    <p>
      Abrí <a href="http://localhost:5173/dashboard" target="_blank">Megarepartos</a> y usá el
      botón "Campaña". Si la extensión está activa, vas a ver un nuevo modo de envío
      automático.
    </p>
    <div class="row">
      <span>Versión</span>
      <span id="version" class="badge">—</span>
    </div>
    <div class="row">
      <span>WhatsApp Web</span>
      <span id="wa-status">—</span>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
