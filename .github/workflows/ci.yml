name: CI

# Sólo en PR. El push a main es redundante (el PR ya validó la merge commit
# antes del merge) y en repos privados duplica el consumo de minutos del free tier.
on:
  pull_request:

# Cancela runs vencidos cuando hay push nuevo sobre la misma rama.
# Crítico para el free tier — si pusheas 3 commits seguidos a un PR,
# se cancelan los 2 primeros en vez de correr 3 veces los 3 jobs.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Detecta qué cambió para skipear jobs irrelevantes. Sin pip install ni
  # nada, ~5s. Si solo cambió frontend, no corre backend (~2 min ahorro).
  changes:
    name: Detectar cambios
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      scripts: ${{ steps.filter.outputs.scripts }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              - '.github/workflows/ci.yml'
            frontend:
              - 'frontend/**'
              - '.github/workflows/ci.yml'
            scripts:
              - 'scripts/**'
              - 'backend/src/megarepartos/api/**'
              - 'backend/src/megarepartos/domain/**'
              - 'behaviors/**'
              - '.github/workflows/ci.yml'

  # Backend: lint + tests en un solo job para no pagar `pip install` dos veces.
  backend:
    name: Backend (ruff + mypy + pytest)
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install backend
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: ruff check
        working-directory: backend
        run: ruff check .

      - name: ruff format check
        working-directory: backend
        run: ruff format --check .

      - name: mypy
        working-directory: backend
        run: mypy src

      - name: pytest
        working-directory: backend
        run: pytest --import-mode=importlib --override-ini="addopts=" || [ $? -eq 5 ]

  # Frontend: lint + build en un solo job.
  frontend:
    name: Frontend (biome + vite build)
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend
        working-directory: frontend
        run: npm install --no-audit --no-fund

      - name: biome check
        working-directory: frontend
        run: npm run lint

      - name: Vite build
        working-directory: frontend
        run: npm run build

  # Scripts de validación — sólo Python stdlib, ~15s sin pip install.
  scripts:
    name: Reglas arquitectura + cobertura
    needs: changes
    if: needs.changes.outputs.scripts == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python scripts/check_arquitectura.py
      - run: python scripts/behavior_coverage.py
      - run: python scripts/check_endpoint_isolation.py
