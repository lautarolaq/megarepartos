name: CI

# Sólo en PR. El push a main es redundante (el PR ya validó la merge commit
# antes del merge) y en repos privados duplica el consumo de minutos del free tier.
on:
  pull_request:

# Cancela runs vencidos cuando hay push nuevo sobre la misma rama.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Backend: lint + tests en un solo job para no pagar `pip install` dos veces.
  backend:
    name: Backend (ruff + mypy + pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install backend
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: ruff check
        working-directory: backend
        run: ruff check .

      - name: ruff format check
        working-directory: backend
        run: ruff format --check .

      - name: mypy
        working-directory: backend
        run: mypy src

      - name: pytest
        working-directory: backend
        # En TASK-000 la suite está vacía: `--passed` evita exit 5 ("no tests collected").
        run: pytest --import-mode=importlib --override-ini="addopts=" || [ $? -eq 5 ]

  # Frontend: lint + build en un solo job.
  frontend:
    name: Frontend (biome + vite build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend
        working-directory: frontend
        run: npm install --no-audit --no-fund

      - name: biome check
        working-directory: frontend
        run: npm run lint

      - name: Vite build
        working-directory: frontend
        run: npm run build

  # Scripts de validación de arquitectura/behaviors — sólo Python stdlib, no
  # necesitan pip install. Se juntan en un job para no pagar el setup 3 veces.
  scripts:
    name: Reglas arquitectura + cobertura
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python scripts/check_arquitectura.py
      - run: python scripts/behavior_coverage.py
      - run: python scripts/check_endpoint_isolation.py
